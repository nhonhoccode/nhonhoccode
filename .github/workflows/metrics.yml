name: Metrics

on:
  # Refresh daily
  schedule:
    - cron: "0 0 * * *"
  # Allow manual run from the Actions tab
  workflow_dispatch:
  # Regenerate whenever main changes
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics card (camo-proof, committed SVG)
        uses: lowlighter/metrics@latest
        with:
          # PAT (classic, scopes: public_repo + read:user) stored as the
          # METRICS_TOKEN secret. Required so metrics can read ALL public
          # repositories — the default GITHUB_TOKEN only sees this one repo.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh

          # Top languages — show language NAMES only (no % / byte numbers),
          # just the coloured proportion bar. Keep Jupyter & HTML (real DS /
          # web work); drop pure config / styling noise.
          plugin_languages: yes
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_sections: most-used
          plugin_languages_ignored: >-
            css, scss, less, tex, roff, dockerfile, makefile,
            batchfile, powershell, procfile, dotenv

          # Year-long commit calendar (isometric)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Dark theme to match the profile (#0D1117 / accent #2C9EF7)
          extras_css: >
            body { background: #0D1117 !important; color: #c9d1d9 !important; }
            h2, .title { color: #2C9EF7 !important; }
            .field, .text, td, th { color: #c9d1d9 !important; }
            a { color: #58A6FF !important; }
            .calendar-graph text { fill: #c9d1d9 !important; }
