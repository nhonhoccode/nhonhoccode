name: Metrics

on:
  # Refresh daily
  schedule:
    - cron: "0 0 * * *"
  # Allow manual run from the Actions tab
  workflow_dispatch:
  # Regenerate whenever main changes (commits made by GITHUB_TOKEN do NOT
  # re-trigger this, so there is no loop)
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics card (camo-proof, committed SVG)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh

          # Top languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Year-long commit calendar (isometric)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Dark theme to match the profile (#0D1117 / accent #2C9EF7)
          extras_css: >
            body { background: #0D1117 !important; color: #c9d1d9 !important; }
            h2, .title { color: #2C9EF7 !important; }
            .field, .text, td, th { color: #c9d1d9 !important; }
            a { color: #58A6FF !important; }
            .calendar-graph text { fill: #c9d1d9 !important; }
